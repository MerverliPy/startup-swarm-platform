services:
  api:
    build: ./apps/api
    env_file:
      - .env
      - ./apps/api/.env
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api:/app
      - ./runs:/runs

  web:
    build: ./apps/web
    env_file:
      - .env
      - ./apps/web/.env.local
    ports:
      - "3001:3000"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - ./data:/app/data
    environment:
      - CLI_URL=127.0.0.1:4321

  copilot-cli:
    build: ./apps/copilot-cli
    env_file:
      - .env
    environment:
      - COPILOT_GITHUB_TOKEN=${COPILOT_GITHUB_TOKEN}
    network_mode: "service:web"
    restart: "no"
    volumes:
      - copilot-session-data:/root/.copilot/session-state

volumes:
  copilot-session-data:
